<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Portal de Organizaciones</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/estilos.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <header>
        <div id="nav-placeholder"></div>
    </header>

    <main class="flex-grow-1">
        <section class="hero-section text-white text-center d-flex align-items-center py-5">
            <div class="container">
                <h2 class="display-5 fw-bold">Red de Agencias Cooperantes por Alta Verapaz</h2>
                <p class="lead">Bienvenido al portal interactivo con mapa y análisis de proyectos educativos.</p>
            </div>
        </section>
        <div class="py-4 bg-white">
            <div class="container text-center">
                <h4 class="fw-bold mb-4">Organizaciones participantes</h4>
                <div id="carouselLogos" class="carousel slide carousel-fade" data-bs-ride="carousel">

                    <div class="carousel-inner">

                        <div class="carousel-item active">
                            <div class="d-flex justify-content-center gap-4 flex-wrap align-items-center">
                                <div class="logo-card">
                                    <img src="images/logos/ffth.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/isra.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/fmts.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/mercy.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/multiplicados.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/compassion.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/adri.png" class="logo-item">
                                </div>

                            </div>
                        </div>
                        <div class="carousel-item">
                            <div class="d-flex justify-content-center gap-4 flex-wrap align-items-center">
                                <div class="logo-card">
                                    <img src="images/logos/coni.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/fjbg.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/plan.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/renace.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/puente.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/conexion.png" class="logo-item">
                                </div>
                                <div class="logo-card">
                                    <img src="images/logos/edm.png" class="logo-item">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            fetch('nav.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('nav-placeholder').innerHTML = data;
                })
        </script>

    </main>


    <footer class="bg-primary text-white text-center py-3">
        <p class="mb-0">© 2026 Fundación Miguel Torrebiarte - Portal de Proyectos</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
